<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#181715" />

  <title>Leben in Deutschland</title>
  <meta
    name="description"
    content="Multilingual preparation for Leben in Deutschland and the German naturalisation test."
  />

  <style>
    :root {
      color-scheme: light dark;
      --ink: #181715;
      --ink-soft: #59564f;
      --paper: #f8f5ed;
      --paper-2: #eee9dd;
      --card: rgba(255, 253, 247, 0.88);
      --line: rgba(24, 23, 21, 0.10);
      --gold: #d99c2b;
      --gold-soft: #f1dfb1;
      --red: #a62a31;
      --shadow: 0 24px 70px rgba(32, 28, 20, 0.10);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 78% 4%, rgba(217, 156, 43, 0.18), transparent 29rem),
        radial-gradient(circle at 5% 32%, rgba(166, 42, 49, 0.055), transparent 25rem),
        var(--paper);
    }

    a { color: inherit; }

    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0 52px;
    }

    .nav {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 62px;
      padding: 10px 12px 10px 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(248, 245, 237, 0.80);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 10px 35px rgba(28, 25, 19, 0.07);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-mark {
      width: 39px;
      height: 39px;
      object-fit: contain;
      filter: drop-shadow(0 5px 10px rgba(26, 23, 18, 0.15));
    }

    .brand-title {
      font-size: 17px;
    }

    select {
      appearance: none;
      min-width: 150px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        linear-gradient(45deg, transparent 50%, var(--gold) 50%) calc(100% - 18px) 50% / 5px 5px no-repeat,
        linear-gradient(135deg, var(--gold) 50%, transparent 50%) calc(100% - 13px) 50% / 5px 5px no-repeat,
        rgba(255,255,255,.58);
      color: var(--ink);
      padding: 11px 38px 11px 13px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(310px, .8fr);
      gap: clamp(36px, 8vw, 96px);
      align-items: center;
      padding: clamp(64px, 10vw, 124px) 0 84px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 22px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #181715;
      color: #fffaf0;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .flag-dot {
      width: 24px;
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(to bottom, #181715 0 33%, #a62a31 33% 66%, #d99c2b 66%);
      outline: 1px solid rgba(255,255,255,.18);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(48px, 8.7vw, 104px);
      line-height: .91;
      letter-spacing: -.067em;
      text-wrap: balance;
    }

    .intro {
      max-width: 660px;
      margin: 28px 0 0;
      color: var(--ink-soft);
      font-size: clamp(18px, 2.1vw, 23px);
      line-height: 1.5;
      text-wrap: pretty;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 11px;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      min-height: 50px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 760;
    }

    .button-primary {
      color: #fffaf0;
      background: #181715;
      box-shadow: 0 10px 25px rgba(24,23,21,.14);
    }

    .button-secondary {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.48);
    }

    .icon-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 390px;
    }

    .icon-stage::before {
      content: "";
      position: absolute;
      width: 90%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(217,156,43,.23), rgba(217,156,43,.03) 58%, transparent 71%);
      filter: blur(2px);
    }

    .app-icon {
      position: relative;
      width: min(100%, 390px);
      aspect-ratio: 1;
      object-fit: contain;
      filter: drop-shadow(0 28px 38px rgba(34, 29, 20, .22));
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .card {
      grid-column: span 12;
      padding: clamp(24px, 4vw, 40px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .card:nth-child(2),
    .card:nth-child(3) {
      grid-column: span 6;
    }

    .card-label {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
    }

    h2 {
      margin: 0 0 14px;
      font-size: clamp(25px, 3vw, 36px);
      letter-spacing: -.035em;
    }

    p, li {
      color: var(--ink-soft);
      line-height: 1.68;
    }

    ul {
      margin: 20px 0 0;
      padding-inline-start: 22px;
    }

    li + li { margin-top: 9px; }

    .support-link {
      display: inline-flex;
      margin-top: 8px;
      padding: 11px 14px;
      border-radius: 13px;
      background: var(--gold-soft);
      color: var(--ink);
      font-weight: 750;
      text-decoration: none;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 30px;
      padding: 24px 4px 0;
      color: #817d72;
      font-size: 13px;
    }

    [dir="rtl"] .nav,
    [dir="rtl"] footer {
      flex-direction: row-reverse;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f7f2e5;
        --ink-soft: #bdb5a5;
        --paper: #0f0e0d;
        --paper-2: #191714;
        --card: rgba(29, 27, 24, .86);
        --line: rgba(255,255,255,.10);
        --gold-soft: #3a2c14;
        --shadow: 0 24px 80px rgba(0,0,0,.28);
      }

      body {
        background:
          radial-gradient(circle at 78% 4%, rgba(217,156,43,.13), transparent 29rem),
          radial-gradient(circle at 5% 32%, rgba(166,42,49,.08), transparent 25rem),
          var(--paper);
      }

      .nav {
        background: rgba(15,14,13,.78);
      }

      select, .button-secondary {
        background: rgba(255,255,255,.045);
      }

      .app-icon {
        filter:
          drop-shadow(0 26px 50px rgba(0,0,0,.48))
          brightness(.94);
      }

      .eyebrow,
      .button-primary {
        background: #181715;
        color: #fffaf0;
      }

      .button-secondary {
        color: var(--ink);
      }
    }

    @media (max-width: 760px) {
      .page { width: min(100% - 26px, 1120px); }
      .brand-title { display: none; }
      select { min-width: 135px; }
      .hero {
        grid-template-columns: 1fr;
        padding-top: 56px;
        gap: 32px;
      }
      .hero-copy { order: 2; }
      .icon-stage {
        order: 1;
        min-height: 260px;
      }
      .app-icon { width: min(78vw, 310px); }
      .card:nth-child(2),
      .card:nth-child(3) {
        grid-column: span 12;
      }
      footer { flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-icon { animation: none; }
      html { scroll-behavior: auto; }
    }
  
    .nav select {
      appearance: none;
      min-width: 170px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      background:
        linear-gradient(45deg, transparent 50%, #d99c2b 50%) calc(100% - 18px) 50% / 5px 5px no-repeat,
        linear-gradient(135deg, #d99c2b 50%, transparent 50%) calc(100% - 13px) 50% / 5px 5px no-repeat,
        rgba(255,255,255,.05);
      color: var(--ink);
      padding: 11px 38px 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .brand-mark,
    .app-icon {
      background: transparent !important;
    }

    .icon-stage {
      background: transparent !important;
    }

  </style>
</head>

    <nav class="nav">
      <div class="brand">
        <img class="brand-mark" src="leben-logo.png" alt="" />
        <span class="brand-title">Leben in Deutschland</span>

      <select id="lang" aria-label="Language">

        <option value="en">English</option>
        <option value="uk">Українська</option>
        <option value="tr">Türkçe</option>
        <option value="ar">العربية</option>
        <option value="pl">Polski</option>
        <option value="ro">Română</option>
        <option value="it">Italiano</option>
        <option value="bg">Български</option>
        <option value="hr">Hrvatski</option>

        <option value="ku">Kurdî</option>

    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">
          <span class="flag-dot"></span>

      <div class="icon-stage">
        <img

      </div>
    </section>

    <div class="content-grid">
      <section class="card" id="privacy">
        <span class="card-label">Privacy</span>
        <h2 data-k="privacyTitle"></h2>
        <p data-k="privacyIntro"></p>
        <ul>

          <li data-k="p2"></li>
          <li data-k="p3"></li>
          <li data-k="p4"></li>
          <li data-k="p5"></li>
        </ul>
      </section>

      <section class="card" id="support">
        <span class="card-label">Contact</span>
        <h2 data-k="supportTitle"></h2>
        <p data-k="supportText"></p>
        <a class="support-link" href="mailto:denisvasiluk@gmail.com">
          denisvasiluk@gmail.com
        </a>
      </section>

      <section class="card">
        <span class="card-label">Independent app</span>
        <h2 data-k="disclaimerTitle"></h2>
        <p data-k="disclaimerText"></p>
      </section>
    </div>

    <footer>
      <span>© 2026 Leben in Deutschland</span>
      <span>Schwarz · Rot · Gold</span>
    </footer>
  </main>
